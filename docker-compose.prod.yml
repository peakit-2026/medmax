services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-oculus}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-oculus}
      POSTGRES_DB: ${DB_NAME:-oculus}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    image: ghcr.io/${GITHUB_REPO}/backend:latest
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://${DB_USER:-oculus}:${DB_PASSWORD:-oculus}@db:5432/${DB_NAME:-oculus}
      JWT_SECRET: ${JWT_SECRET}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-ru-central1}
      S3_BUCKET: ${S3_BUCKET:-oculus-feldsher}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      RUST_LOG: info
    restart: unless-stopped

  frontend:
    image: ghcr.io/${GITHUB_REPO}/frontend:latest
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  pgdata:
