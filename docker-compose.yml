services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: oculus
      POSTGRES_PASSWORD: oculus
      POSTGRES_DB: oculus
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://oculus:oculus@db:5432/oculus
    restart: unless-stopped

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  pgdata:
